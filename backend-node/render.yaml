services:
  - type: web
    name: vishwakarma-cooperative-backend
    runtime: node
    repo: https://github.com/your-org/vishwakarma-cooperative
    branch: main
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: vishwakarma-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://vishwakarma-bank.netlify.app
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"

databases:
  - name: vishwakarma-db
    databaseName: vishwakarma
    user: vishwakarma
    plan: free
    region: oregon
